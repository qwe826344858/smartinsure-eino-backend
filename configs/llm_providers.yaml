# LLM multi-provider registry.
default_provider: minimax

routing:
  intent:
    provider: minimax
  query:
    provider: minimax
  answer:
    provider: minimax
  followup:
    provider: minimax
  detail:
    provider: minimax
  agent_planner:
    provider: minimax
  deep_agent:
    provider: minimax

providers:
  minimax:
    description: "MiniMax（海螺 AI）"
    prefix: "openai"
    default_model: "MiniMax-M2.5-highspeed"
    api_key_env: "MINIMAX_API_KEY"
    api_base_env: "MINIMAX_API_BASE"
    default_base: "https://api.minimaxi.com/v1"

  openai:
    description: "OpenAI"
    prefix: "openai"
    default_model: "gpt-4o-mini"
    api_key_env: "OPENAI_API_KEY"
    api_base_env: "OPENAI_API_BASE"
    default_base: "https://api.openai.com/v1"

  deepseek:
    description: "DeepSeek"
    prefix: "deepseek"
    default_model: "deepseek-chat"
    api_key_env: "DEEPSEEK_API_KEY"
    api_base_env: "DEEPSEEK_API_BASE"
    default_base: "https://api.deepseek.com/v1"

  qwen:
    description: "通义千问（DashScope）"
    prefix: "openai"
    default_model: "qwen-plus"
    api_key_env: "QWEN_API_KEY"
    api_base_env: "QWEN_API_BASE"
    default_base: "https://dashscope.aliyuncs.com/compatible-mode/v1"

  zhipu:
    description: "智谱 AI（GLM）"
    prefix: "openai"
    default_model: "glm-4-flash"
    api_key_env: "ZHIPU_API_KEY"
    api_base_env: "ZHIPU_API_BASE"
    default_base: "https://open.bigmodel.cn/api/paas/v4"

  moonshot:
    description: "Moonshot（Kimi）"
    prefix: "openai"
    default_model: "moonshot-v1-8k"
    api_key_env: "MOONSHOT_API_KEY"
    api_base_env: "MOONSHOT_API_BASE"
    default_base: "https://api.moonshot.cn/v1"

  anthropic:
    description: "Anthropic（Claude）"
    prefix: "anthropic"
    default_model: "claude-sonnet-4-20250514"
    api_key_env: "ANTHROPIC_API_KEY"
    api_base_env: "ANTHROPIC_API_BASE"
    default_base: "https://api.anthropic.com"
